<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player Win % vs Total Games (Live)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-color: #f0f2f5;
}
h2 { margin-bottom: 20px; color: #333; }
.chart-container {
    width: 90%;
    max-width: 900px;
    height: 450px;
    margin-bottom: 20px;
    background-color: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    padding: 10px;
}
canvas { width: 100%; height: 100%; display: block; }
table {
    border-collapse: collapse;
    width: 90%;
    max-width: 900px;
    margin-bottom: 50px;
    background-color: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
th { background-color: #f7f9fb; color: #555; }
tr:last-child td { border-bottom: none; }
td:nth-child(2) { text-align: left; padding-left: 12px; }
.player-color { width: 14px; height: 14px; display: inline-block; margin-right: 8px; border-radius: 50%; vertical-align: middle; }
label { margin-bottom: 10px; font-weight: bold; }
</style>
</head>
<body>

<h2>Player Win % vs Total Games (Live)</h2>
<label><input type="checkbox" id="showHistory"> Show History Lines</label>

<div class="chart-container">
    <canvas id="winsChart"></canvas>
</div>

<table id="rankingTable">
    <thead>
        <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Wins</th>
            <th>Total Games</th>
            <th>Win %</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let chart;
let historyData = {}; // { playerName: [{x, y}] }
const POINT_ALPHA = 0.3;
let selectedPlayers = new Set(); // Track which players are currently visible

function generatePastelColors(n){
    const colors=[];
    for(let i=0;i<n;i++){
        const hue=(i*137.508)%360;
        colors.push(`hsl(${hue},70%,80%)`);
    }
    return colors;
}

async function loadData(){
    const response = await fetch('/kuh-handel/get_results');
    const data = await response.json();

    const players = Object.entries(data).map(([player,ranks])=>{
        const wins = ranks.filter(rank=>rank===0).length;
        const total = ranks.length;
        const winPct = total ? ((wins/total)*100).toFixed(1) : 0.0;
        return {player, wins, total, winPct: parseFloat(winPct), ranks};
    });

    // Sort by win %
    const sortedPlayers=[...players].sort((a,b)=>b.winPct-a.winPct);
    const colors = generatePastelColors(players.length);

    // Assign ranks with ties
    let lastPct = null, displayRank = 0;
    sortedPlayers.forEach((p,i)=>{
        if(p.winPct !== lastPct){
            displayRank = i+1;
            lastPct = p.winPct;
        }
        p.rank = displayRank;
    });

    // Update table
    const tbody=document.querySelector('#rankingTable tbody');
    tbody.innerHTML='';
    sortedPlayers.forEach((p,i)=>{
        const row=document.createElement('tr');
        row.innerHTML=`
            <td>${p.rank}</td>
            <td><span class="player-color" style="background-color:${colors[i]}"></span>${p.player}</td>
            <td>${p.wins}</td>
            <td>${p.total}</td>
            <td>${p.winPct}%</td>
        `;
        row.dataset.player = p.player;
        tbody.appendChild(row);

        // Initialize selection (all players selected initially)
        // Ensure all players are selected by default
        if(!selectedPlayers.size){
            Object.keys(data).forEach(player => selectedPlayers.add(player));
        }

        row.style.opacity = selectedPlayers.has(p.player) ? 1 : 0.3;

        // Click to toggle player visibility
        row.addEventListener('click', ()=>{
            if(selectedPlayers.has(p.player)){
                selectedPlayers.delete(p.player);
                row.style.opacity = 0.3;
            } else {
                selectedPlayers.add(p.player);
                row.style.opacity = 1;
            }
            loadData(); // refresh chart with filtered players
        });
    });

    const showHistory = document.getElementById('showHistory').checked;

    // Reconstruct history for each player from ranks
    players.forEach((p,i)=>{
        const playerHistory = [];
        let winsSoFar = 0;
        p.ranks.forEach((rank, idx)=>{
            if(rank===0) winsSoFar++;
            const totalGames = idx + 1;
            playerHistory.push({x: totalGames, y: (winsSoFar/totalGames)*100});
        });
        historyData[p.player] = playerHistory;
    });

    // Filter players to only selected ones
    const filteredPlayers = players.filter(p => selectedPlayers.has(p.player));

    // Build datasets
    const datasets = filteredPlayers.map((p,i)=>{
        const baseColor = colors[players.findIndex(pl=>pl.player===p.player)];
        const playerHistory = historyData[p.player];
        const datasetData = showHistory ? playerHistory : [playerHistory[playerHistory.length - 1]];

        const bgColor = baseColor.replace('hsl','hsla').replace(')', `,${POINT_ALPHA})`);
        const borderColor = baseColor.replace('hsl','hsla').replace(')', `,${POINT_ALPHA + 0.2})`);

        const datasetPointRadius = datasetData.map((_, idx) => showHistory ? (idx === datasetData.length - 1 ? 6 : 0) : 6);

        return {
            label: p.player,
            data: datasetData,
            showLine: showHistory,
            fill: false,
            pointRadius: datasetPointRadius,
            pointHitRadius: 10,
            pointBackgroundColor: datasetData.map(_ => bgColor),
            pointBorderColor: datasetData.map(_ => borderColor),
            borderColor: baseColor,
            tension: 0.3
        };
    });

    const maxX = Math.max(...Object.values(historyData).flatMap(arr => arr.map(pt=>pt.x))) + 2;

    if(!chart){
        const ctx=document.getElementById('winsChart').getContext('2d');
        chart=new Chart(ctx,{
            type:'scatter',
            data:{datasets:datasets},
            options:{
                responsive:true,
                maintainAspectRatio:false,
                animation:false,
                plugins:{
                    legend: { display: false },
                    tooltip:{
                        callbacks:{
                            label:function(context){
                                const d=context.raw;
                                return `${context.dataset.label}: ${d.y.toFixed(1)}% / ${d.x} games`;
                            }
                        }
                    }
                },
                scales:{
                    x:{beginAtZero:true,max:maxX,title:{display:true,text:'Total Games'},ticks:{stepSize:1}},
                    y:{beginAtZero:true,max:100,title:{display:true,text:'Win %'},ticks:{stepSize:10}}
                }
            }
        });
    } else {
        chart.data.datasets = datasets;
        chart.options.scales.x.max = maxX;
        chart.update();
    }
}


loadData();
setInterval(loadData,1000);
document.getElementById('showHistory').addEventListener('change', loadData);

</script>
</body>
</html>
