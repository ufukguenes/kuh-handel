<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kuh-Handel</title>
    <style>
        :root { --border: #ccc; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 1rem; background: #f5f5f5; }

        .box {
            margin-top: 1rem;
            border: 1px solid #eee;
            padding: 0.75rem;
            border-radius: 6px;
            background: white;
        }
        .box-inner { background: #f1f1f1; border-radius: 6px; padding: 0.75rem; }
        .box-transparent { background: transparent; margin-top: 0; margin-bottom: -0.25rem; }

        .text-field {
            padding: .35rem;
            border: 1px solid var(--border);
            border-radius: .4rem;
            background: #f1f1f1;
        }

        .game-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            transition: all 0.2s ease;
            background: #f1f1f1;
            cursor: pointer;
            min-width: 100px;
        }
        .game-btn:hover { transform: translateY(-3px) scale(1.02); }
        .back-btn { background: #b0b0b0; }

        .create-btn {
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            font-weight: bold;
            font-size: large;
            transition: all 0.2s ease;
            background: #f1f1f1;
            cursor: pointer;
        }
        .create-btn:hover { transform: translateY(-3px) scale(1.02); }

        ul { list-style-type: none; padding: 0; margin: 0; }

        .flex-btn {
            display: inline-flex;
            justify-content: center;
            padding: 0.5rem 0;
        }

        .grid { display: flex; gap: 1rem; align-items: flex-start; }
        .grid > * { flex: 1; }

        .field-label {
            display: inline-block;
            padding: 0.5rem 0.5rem 0.5rem 0;
            font-size: 0.8rem;
            user-select: none;
            font-weight: 400;
        }

        h4 { margin: 0 0.5rem 0.5rem 0; display: inline; }
        h5 { margin: 0 0 0.5rem 0; }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
